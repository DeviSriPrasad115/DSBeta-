<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .card-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        height: 100vh;
      }
      
      .card {
        width: 250px;
        height: 350px;
        perspective: 1000px;
      }
      
      .card-front, .card-back {
        width: 100%;
        height: 100%;
        position: absolute;
        backface-visibility: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
     
      
      .card-back {
        transform: rotateY(180deg);
      }
      
      .card:hover .card-front {
        transform: rotateY(180deg);
      }
      
      .card:hover .card-back {
        transform: rotateY(360deg);
      }
      
      img {
        width: 100%;
      }
      
      button {
        margin-top: 20px;
      }
      
    </style>
  </head>
  <body>
    <div class="card-container">
      <div class="card" id="card">
        <div class="card-front">
          <img
            src="https://i.pinimg.com/736x/07/11/04/07110439c04ecba8962691f9b61891a0.jpg"
            alt="Card Image"
          />
          <h3>Naruto</h3>
        </div>
        <div class="card-back">
          <p>
            Naruto is a loud, outspoken, and egotistical ninja who is shunned by
            his peers and villagers because he has a demon fox sealed within
            him. However, he overcomes these challenges through hard work and
            perseverance, and eventually earns the respect of others
          </p>
        </div>
      </div>
      <button id="toggle-btn">Flip Card</button>
    </div>

    <script>
      const toggleButton = document.getElementById("toggle-btn");
      const card = document.getElementById("card");

      toggleButton.addEventListener("click", () => {
        card.classList.toggle("flipped");
      });
    </script>
  </body>
</html>
