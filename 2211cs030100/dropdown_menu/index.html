<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Dropdown Menu</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dropdown-container">
    <div class="dropdown" onclick="toggleDropdown()">
      <span id="selectedValue">Select an option</span>
      <i class="arrow"></i>
    </div>
    <ul class="dropdown-options" id="dropdownOptions">
      <li onclick="selectOption('Option 1')">Option 1</li>
      <li onclick="selectOption('Option 2')">Option 2</li>
      <li onclick="selectOption('Option 3')">Option 3</li>
      <li onclick="selectOption('Option 4')">Option 4</li>
    </ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
