<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Form Validation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        
        .form-container {
            width: 300px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        
        input:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .success-message {
            color: #2ecc71;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .error {
            border-color: #e74c3c;
        }
        
        .success {
            border-color: #2ecc71;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <form id="validationForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <div class="error-message" id="emailError">Please enter a valid email address.</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password">
                <div class="error-message" id="passwordError">Password must be at least 6 characters long.</div>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        const emailField = document.getElementById('email');
        const emailError = document.getElementById('emailError');
        const passwordField = document.getElementById('password');
        const passwordError = document.getElementById('passwordError');

        emailField.addEventListener('input', () => {
            const emailValue = emailField.value;
            if (emailValue.trim() === '' || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue)) {
                emailField.classList.add('error');
                emailField.classList.remove('success');
                emailError.style.display = 'block';
            } else {
                emailField.classList.remove('error');
                emailField.classList.add('success');
                emailError.style.display = 'none';
            }
        });

        passwordField.addEventListener('input', () => {
            const passwordValue = passwordField.value;
            if (passwordValue.trim() === '' || passwordValue.length < 6) {
                passwordField.classList.add('error');
                passwordField.classList.remove('success');
                passwordError.style.display = 'block';
            } else {
                passwordField.classList.remove('error');
                passwordField.classList.add('success');
                passwordError.style.display = 'none';
            }
        });

        const form = document.getElementById('validationForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Form submitted successfully!');
        });
    </script>
</body>

</html>
