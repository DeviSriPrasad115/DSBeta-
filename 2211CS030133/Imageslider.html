<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider with Dots</title>
    <link rel="stylesheet" href="imageslider.css">
</head>
<body>
    <div class="slider-container">
        <div class="slider">
            <!-- Slide 1: Spaceship Image -->
            <div class="slide active">
                <img src="https://images.unsplash.com/photo-1517976487492-5750f3195933?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofDF8fHNwYWNlc2hpcHxlbnwwfHx8fDE2ODkwNjQ1MTI&ixlib=rb-4.0.3&q=80&w=800" alt="Spaceship Image">
            </div>
    
            <!-- Slide 2: Spaceship Image 2 -->
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1562565065-32b92a03e5c2?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofDF8fHNwYWNlc2hpcHxlbnwwfHx8fDE2ODkwNjQ1MTI&ixlib=rb-4.0.3&q=80&w=800" alt="Spaceship Image 2">
            </div>
    
            <!-- Slide 3: Spaceship Image 3 -->
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1631608380735-d9f0e9d3fd94?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofDdfNXwxcGFuZGVtaWMgc3BhY2VzaGlwfGVufDB8fHx8fDE2ODkwNjQ1MTI&ixlib=rb-4.0.3&q=80&w=800" alt="Spaceship Image 3">
            </div>
        </div>
        
        <div class="dots">
            <span class="dot active" data-slide="0"></span>
            <span class="dot" data-slide="1"></span>
            <span class="dot" data-slide="2"></span>
        </div>
    </div>

    <script src="imageslider.js"></script>
</body>
</html>
