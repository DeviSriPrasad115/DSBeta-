<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Tab Navigation</title>
    <link rel="stylesheet" href="dynamic.css">
</head>
<body>
    <div class="tabs-container">
        <div class="tabs">
            <button class="tab active" data-tab="tab1">Tab 1</button>
            <button class="tab" data-tab="tab2">Tab 2</button>
            <button class="tab" data-tab="tab3">Tab 3</button>
        </div>
        <div class="tab-content">
            <div id="tab1" class="content active">
                <h2>Lion</h2>
                <p>Lions are kings of jungle but i prefer tigers , because why not?.</p>
            </div>
            <div id="tab2" class="content">
                <h2>Tigers</h2>
                <p>well tigers are great now arent they?.</p>
            </div>
            <div id="tab3" class="content">
                <h2>owl</h2>
                <p>owls are silent killers , fun fact : they have no to little sound when they fly and they are nocturnal.</p>
            </div>
        </div>
    </div>
    <script src="dynamic.js"></script>
</body>
</html>
