<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Card</title>
    <link rel="stylesheet" href="responive.css">
</head>
<body>
    <div class="card-container">
        <div class="card" id="card">
            <div class="card-front">
                <img src="https://images.unsplash.com/photo-1517976487492-5750f3195933?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofDF8fHNwYWNlc2hpcHxlbnwwfHx8fDE2ODkwNjQ1MTI&ixlib=rb-4.0.3&q=80&w=400" alt="Card Image">
                <h3>Spaceship</h3>
                <button id="toggleBtn">More Info</button>
            </div>
            <div class="card-back">
                <h3>Spaceship</h3>
                <p>Spaceships are great, aren't they? Everybody loves spaceships.</p>
            </div>
        </div>
    </div>

    <script src="responsive.js"></script>
</body>
</html>
