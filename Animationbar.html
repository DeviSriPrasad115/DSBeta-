<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Navigation Bar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #333;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin: 0 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.2rem;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #f39c12;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background: #f39c12;
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links .active {
            color: #f39c12;
        }

        section {
            height: 100vh;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: #333;
        }

        #home { background: #f7f7f7; }
        #about { background: #e8e8e8; }
        #services { background: #dcdcdc; }
        #contact { background: #ccc; }

    </style>
</head>
<body>
    <nav>
        <ul class="nav-links">
            <li><a href="#home" id="link-home">Home</a></li>
            <li><a href="#about" id="link-about">About</a></li>
            <li><a href="#services" id="link-services">Services</a></li>
            <li><a href="#contact" id="link-contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home">Home Section</section>
    <section id="about">About Section</section>
    <section id="services">Services Section</section>
    <section id="contact">Contact Section</section>

    <script>
        const links = document.querySelectorAll('.nav-links a');
        const sections = document.querySelectorAll('section');

        window.addEventListener('scroll', () => {
            let current = "";

            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - 50) {
                    current = section.getAttribute('id');
                }
            });

            links.forEach(link => {
                link.classList.remove('active');
                if (link.id === `link-${current}`) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
