<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Popup</title>
  <link rel="stylesheet" href="modelpopup.css">
</head>
<body>
  <button id="openModalBtn" class="trigger-btn">Open Modal</button>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeModalBtn" class="close-btn">&times;</span>
      <h2>Modal Title</h2>
      <p>This is a modal popup. You can include any content here.</p>
      <img src="https://tse3.mm.bing.net/th?id=OIP.yVoA5c5jdYdk-mSAahxRkwHaEK&pid=Api&P=0&h=180" alt="Example Image" style="width: 100%; border-radius: 5px;">
    </div>
  </div>

  <script src="modelpopup.js"></script>
</body>
</html>
