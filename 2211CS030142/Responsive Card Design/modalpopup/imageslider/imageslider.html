<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider with Dots</title>
  <link rel="stylesheet" href="imageslider.css">
</head>
<body>
  <div class="slider-container">
    <div class="slider">
      <img src="https://image.slidesdocs.com/responsive-images/background/forest-nature-in-forest-rain-powerpoint-background_b993004544__960_540.jpg" alt="Slide 1" class="slide">
      <img src="https://tse4.mm.bing.net/th?id=OIP.x5r4KBcJ5fQ0bUh8CZeSLgHaEK&pid=Api&P=0&h=180" alt="Slide 2" class="slide">
      <img src="https://image.slidesdocs.com/responsive-images/background/natural-forest-environment-powerpoint-background_5d9f329c51__960_540.jpg" alt="Slide 3" class="slide">
    </div>
    <div class="dots">
      <span class="dot" data-slide="0"></span>
      <span class="dot" data-slide="1"></span>
      <span class="dot" data-slide="2"></span>
    </div>
  </div>
  <script src="imageslider.js"></script>
</body>
</html>
