<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Flip Card</title>
  <link rel="stylesheet" href="responsivecard.css">
</head>
<body>
  <div class="card-container">
    <div class="card" id="flipCard">
      <div class="card-front">
        <img src="https://s3-alpha.figma.com/hub/file/4300892644/f071bf69-ef4d-4946-9f06-2d1f798b0481-cover.png" alt="Card Image" class="card-image">
        
        <button class="info-btn">More Info</button>
      </div>
      <div class="card-back">
        <p>Here’s some more information about this card. It’s a beautiful design!</p>
        <button class="info-btn" id="flipBackBtn">Go Back</button>
      </div>
    </div>
  </div>
  <script src="responsivecard.js"></script>
</body>
</html>
