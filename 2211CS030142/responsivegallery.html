<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Gallery with Filtering</title>
  <link rel="stylesheet" href="responsivegallery.css">
</head>
<body>
  <h1>Responsive Gallery with Filtering</h1>
  <div class="filter-buttons">
    <button class="filter-btn" onclick="filterGallery('all')">All</button>
    <button class="filter-btn" onclick="filterGallery('nature')">Nature</button>
    <button class="filter-btn" onclick="filterGallery('animals')">Animals</button>
    <button class="filter-btn" onclick="filterGallery('architecture')">Architecture</button>
  </div>

  <div class="gallery">
    <div class="gallery-item nature">
      <img src="https://mobirise.com/bootstrap-gallery/assets1/images/photo-1452825152636-89e0f09f1267-1354x898.jpg" alt="Nature 1">
    </div>
    <div class="gallery-item animals">
      <img src="https://cdn.petzlover.com/responsive/500x500/petzlover/gallery/img/l/golden-retriever-2397726.jpeg.webp" alt="Animal 1">
    </div>
    <div class="gallery-item architecture">
      <img src="https://tse1.mm.bing.net/th?id=OIP.3i0_U7HbDr6yzEIcKaM1iwHaE7&pid=Api&P=0&h=180" alt="Architecture 1">
    </div>
    <div class="gallery-item nature">
      <img src="https://img.freepik.com/premium-photo/kerala-backwater-nature-beauty_128305-150.jpg" alt="Nature 2">
    </div>
    <div class="gallery-item animals">
      <img src="https://tse1.mm.bing.net/th?id=OIP.XtNmU_Potr8YCQhk6qRwaQHaE6&pid=Api&P=0&h=180" alt="Animal 2">
    </div>
    <div class="gallery-item architecture">
      <img src="https://tse4.mm.bing.net/th?id=OIP.CgX7bGvuFK9obhEeBJKPegHaGd&pid=Api&P=0&h=180" alt="Architecture 2">
    </div>
  </div>

  <script src="responsivegallery.js"></script>
</body>
</html>
