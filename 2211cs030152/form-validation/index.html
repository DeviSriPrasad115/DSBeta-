<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        *{
            margin: 0;padding: 0;
        }
        .main{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form{
            width:350px;height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .content{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #email,#password{
            display: flex;
            flex-direction: column;
        }
        #content2{
            display: flex;
            align-items: center;
            gap:20px;
        }
        #validator{
            width:0px;
            height: 5px;
            border-radius: 10px;
            transition: width 1s linear;
        }
        .red{
            background-color: red;
        }
        .yellow{
            background-color: yellow;
            opacity: 1;
        }
        .green{
            background-color: green;
        }
        .redtext{
            color: red;
            font-size:10px;
        }
        
    </style>
  </head>
  <body>
    <div class="main">
        <form action="" class="form">
            <div class="content">
                <div class="email">
                    <div id="content2">
                        <label for="email">Enter your email</label>
                        <input type="text" id="email" class="input">
                    </div>
                    <div class="redtext" id="message1"></div>
                </div>
                <div id="password">
                    <div id="content2">
                        <label for="pass">Enter your pass:</label>
                        <input type="password" id="pass" class="input">
                        <div id="validator" class="red"></div>
                    </div>
                    <div id="message2" class="redtext"></div>
                </div>
            </div>
            <button type="submit" id="submit">Submit</button>
        </form>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
