<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .entire{
            width: 100vw;
            height: 100vh;
        }
        #content{
            height:90%;
            width:100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1s;
        }
        .tabs{
            display: flex;
            width: 100%;
            height: 10%;

            align-items: center;
        }
        .tabs div{
            width:100%;
            height:100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border:2px solid black;
            cursor:pointer;
        }
        .tabs div:focus{
            outline: none;
            background-color: green;
            transition:all 1s;
        }
    </style>
</head>
<body>
    <div class="entire">
        <div class="tabs">
            <div tabindex="0" id="content1">Content 1</div>
            <div tabindex="0" id="content2">Content 2</div>
            <div tabindex="0" id="content3">Content 3</div>
            <div tabindex="0" id="content4">Content 4</div>
        </div>
        <div id="content">
            content
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
