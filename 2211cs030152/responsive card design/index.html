<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="card-container">
        <div class="card" id="card">
          <div class="card-front">
            <img src="https://i.pinimg.com/736x/07/11/04/07110439c04ecba8962691f9b61891a0.jpg" alt="Card Image">
            <h3>Naruto</h3>
          </div>
          <div class="card-back">
            <p>Naruto is a loud, outspoken, and egotistical ninja who is shunned by his peers and villagers because he has a demon fox sealed within him. However, he overcomes these challenges through hard work and perseverance, and eventually earns the respect of others</p>
          </div>
        </div>
        <button id="toggle-btn">Flip Card</button>
      </div>
      
      <script src="./script.js"></script>
</body>
</html>
