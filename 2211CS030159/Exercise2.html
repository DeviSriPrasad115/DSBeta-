<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Navigation Bar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .navbar {
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        .navbar a {
            text-decoration: none;
            color: white;
            margin: 0 15px;
            padding: 10px;
            position: relative;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .navbar a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 2px;
            background-color: #00bcd4;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .navbar a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .navbar a:hover {
            color: #00bcd4;
            transform: scale(1.1);
        }

        .navbar a.active {
            border-bottom: 2px solid #00bcd4;
        }

        section {
            height: 100vh;
            padding: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #section1 { background-color: #f44336; color: white; }
        #section2 { background-color: #4caf50; color: white; }
        #section3 { background-color: #2196f3; color: white; }
        #section4 { background-color: #ff9800; color: white; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar" id="navbar">
            <a href="#section1" class="nav-link">Section 1</a>
            <a href="#section2" class="nav-link">Section 2</a>
            <a href="#section3" class="nav-link">Section 3</a>
            <a href="#section4" class="nav-link">Section 4</a>
        </nav>
    </header>

    <section id="section1">
        <h1>Section 1</h1>
    </section>
    <section id="section2">
        <h1>Section 2</h1>
    </section>
    <section id="section3">
        <h1>Section 3</h1>
    </section>
    <section id="section4">
        <h1>Section 4</h1>
    </section>

    <script>
        const navLinks = document.querySelectorAll('.nav-link');

        function highlightActiveSection() {
            let scrollPosition = window.scrollY + 50; // Adjust for header height

            navLinks.forEach(link => {
                const section = document.querySelector(link.getAttribute('href'));
                if (
                    section.offsetTop <= scrollPosition &&
                    section.offsetTop + section.offsetHeight > scrollPosition
                ) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        window.addEventListener('scroll', highlightActiveSection);
    </script>
</body>
</html>
