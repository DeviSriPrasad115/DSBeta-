<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
        }

        .accordion {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .accordion-header {
            padding: 15px 20px;
            background-color: #007BFF;
            color: #fff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s ease;
        }

        .accordion-header:hover {
            background-color: #0056b3;
        }

        .accordion-header .icon {
            transition: transform 0.3s ease;
        }

        .accordion-header.active .icon {
            transform: rotate(180deg);
        }

        .accordion-content {
            padding: 15px 20px;
            background-color: #f9f9f9;
            display: none;
            border-top: 1px solid #ddd;
            line-height: 1.5;
        }

        .accordion-content.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="accordion">
        <div class="accordion-item">
            <div class="accordion-header">
                Section 1
                <span class="icon">&#9662;</span>
            </div>
            <div class="accordion-content">
                <p>Content for section 1 goes here. This is where you can place detailed information.</p>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header">
                Section 2
                <span class="icon">&#9662;</span>
            </div>
            <div class="accordion-content">
                <p>Content for section 2 goes here. Add anything relevant here.</p>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header">
                Section 3
                <span class="icon">&#9662;</span>
            </div>
            <div class="accordion-content">
                <p>Content for section 3 goes here. More detailed descriptions can be added.</p>
            </div>
        </div>
    </div>

    <script>
        const headers = document.querySelectorAll('.accordion-header');

        headers.forEach(header => {
            header.addEventListener('click', () => {
                const content = header.nextElementSibling;
                const icon = header.querySelector('.icon');

                // Toggle the active class for the header
                header.classList.toggle('active');

                // Toggle the visibility of the content
                if (content.classList.contains('show')) {
                    content.classList.remove('show');
                } else {
                    content.classList.add('show');
                }

                // Toggle the arrow rotation
                icon.classList.toggle('rotate');
            });
        });
    </script>

</body>
</html>
