<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Flip Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .card-container {
            perspective: 1000px;
        }

        .card {
            width: 300px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .card-front {
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .card-front img {
            width: 100%;
            height: 60%;
            object-fit: cover;
        }

        .card-front h3 {
            margin: 10px 0;
        }

        .card-back {
            background-color: #0078d4;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotateY(180deg);
            padding: 20px;
        }

        .toggle-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0078d4;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .toggle-btn:hover {
            background-color: #005fa3;
        }

        @media (max-width: 768px) {
            .card {
                width: 90%;
                height: auto;
            }

            .card-front img {
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card" id="flipCard">
            <div class="card-side card-front">
                <img src="https://via.placeholder.com/300x200" alt="Card Image">
                <h3>Card Title</h3>
                <p>Hover or click for more info</p>
            </div>
            <div class="card-side card-back">
                <p>Here is some more information about this card!</p>
            </div>
        </div>
        <button class="toggle-btn" id="toggleButton">Toggle Flip</button>
    </div>

    <script>
        const card = document.getElementById('flipCard');
        const toggleButton = document.getElementById('toggleButton');

        toggleButton.addEventListener('click', () => {
            card.classList.toggle('flipped');
        });
    </script>
</body>
</html>
