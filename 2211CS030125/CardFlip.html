<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card with Flip Effect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f9;
        }

        .card-container {
            perspective: 1000px;
            width: 300px;
            height: 400px;
            margin: 20px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateY(0deg);
            transition: transform 0.6s;
        }

        .card:hover {
            transform: rotateY(180deg);
        }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .card-front {
            background-color: #fff;
        }

        .card-back {
            background-color: #007bff;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotateY(180deg);
        }

        .card img {
            width: 100%;
            height: auto;
        }

        .card-content {
            padding: 16px;
        }

        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 10px;
        }

        .card-description {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }

        .card a {
            display: inline-block;
            padding: 8px 12px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            text-align: center;
        }

        .card a:hover {
            background-color: #0056b3;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .card-container {
                width: 90%;
                height: 300px;
            }

            .card-title {
                font-size: 18px;
            }

            .card-description {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card">
            <!-- Front Side -->
            <div class="card-side card-front">
                <img src="image.jpg" alt="Card Image">
                <div class="card-content">
                    <h2 class="card-title">Card Title</h2>
                    <p class="card-description">This is a brief description about the card content.</p>
                    <a href="#" target="_blank">Learn More</a>
                </div>
            </div>
            <!-- Back Side -->
            <div class="card-side card-back">
                <p>More Information</p>
            </div>
        </div>
    </div>
</body>
</html>
