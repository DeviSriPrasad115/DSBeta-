<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Form Validation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f4f4f9;
        }

        .form-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .form-container h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: #333;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .form-group input:focus {
            border-color: #007bff;
            outline: none;
        }

        .form-group .error-message {
            color: #e74c3c;
            font-size: 0.875rem;
            margin-top: 5px;
            display: none;
        }

        .form-group.success input {
            border-color: #2ecc71;
        }

        .form-group.error input {
            border-color: #e74c3c;
        }

        .form-group.success .error-message {
            display: none;
        }

        .form-group.error .error-message {
            display: block;
        }

        .form-container button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .form-container button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Sign Up</h2>
        <form id="signup-form">
            <div class="form-group" id="email-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <div class="error-message">Please enter a valid email address.</div>
            </div>

            <div class="form-group" id="password-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password">
                <div class="error-message">Password must be at least 6 characters long.</div>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('signup-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        function setError(element, message) {
            const formGroup = element.parentElement;
            formGroup.classList.add('error');
            formGroup.classList.remove('success');
            const errorMessage = formGroup.querySelector('.error-message');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function setSuccess(element) {
            const formGroup = element.parentElement;
            formGroup.classList.add('success');
            formGroup.classList.remove('error');
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function validatePassword(password) {
            return password.length >= 6;
        }

        emailInput.addEventListener('input', () => {
            if (validateEmail(emailInput.value)) {
                setSuccess(emailInput);
            } else {
                setError(emailInput, 'Please enter a valid email address.');
            }
        });

        passwordInput.addEventListener('input', () => {
            if (validatePassword(passwordInput.value)) {
                setSuccess(passwordInput);
            } else {
                setError(passwordInput, 'Password must be at least 6 characters long.');
            }
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            if (!validateEmail(emailInput.value)) {
                setError(emailInput, 'Please enter a valid email address.');
            }

            if (!validatePassword(passwordInput.value)) {
                setError(passwordInput, 'Password must be at least 6 characters long.');
            }

            if (validateEmail(emailInput.value) && validatePassword(passwordInput.value)) {
                alert('Form submitted successfully!');
            }
        });
    </script>
</body>
</html>
