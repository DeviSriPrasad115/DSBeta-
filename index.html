<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Responsive Card</title>
</head>
<body>
  <!-- Navigation Bar -->
  <nav id="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>

  <br><br><br> 
  <div class="card-container">
    <div class="card" id="card">
      <div class="card-front">
        <img src="images 2.jpeg" alt="Image 1">
      </div>
      <div class="card-back">
        <img src="images 3.jpeg" alt="Image 2">
      </div>
    </div>
    <button class="card-button">Hover to Flip</button>
  </div>
  
  <div class="slider">
    <div class="slides" id="slides">
      <img src="pic1.jpeg" alt="Image 1">
      <img src="images 3.jpeg" alt="Image 2">
      <img src="images 2.jpeg" alt="Image 3">
    </div>
    <div class="dots">
      <span class="dot" onclick="currentSlide(0)"></span>
      <span class="dot" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
    </div>
  </div>

  <div>
    <form id="form">
      <div class="form-control">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email">
        <small class="error" id="emailError"></small>
      </div>
      <div class="form-control">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password">
        <small class="error" id="passwordError"></small>
      </div>
      <button style="margin-left:10px;padding: 10px 20px;background: #007BFF;"type="submit">Submit</button>

        <button  style="margin-bottom:110px; margin-left:120px;padding: 10px 20px;background: #007BFF;" onclick="toggleModal()">Click Here !</button>
      <div class="modal-overlay" id="modal">
        <div class="modal">
          <h2>Greetings</h2>
          <p>Thank you!!</p>
          <button onclick="toggleModal()">Close</button>
        </div>
      </div>
       </div>
    
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
