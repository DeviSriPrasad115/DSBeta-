<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Dropdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dropdown">
    <button class="dropdown-btn">Select Option <span id="selected-value">None</span></button>
    <div class="dropdown-content">
        <a href="#" data-value="Option 1">Option 1</a>
        <a href="#" data-value="Option 2">Option 2</a>
        <a href="#" data-value="Option 3">Option 3</a>
        <a href="#" data-value="Option 4">Option 4</a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
