<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion Menu</title>
  <link rel="stylesheet" href="menu.css">
</head>
<body>

  <div class="accordion">
    <div class="accordion-section">
      <button class="accordion-header">
        Section 1 <span class="arrow">▼</span>
      </button>
      <div class="accordion-content">
        <p>This is the content for Section 1. You can put any text or elements here.</p>
      </div>
    </div>

    <div class="accordion-section">
      <button class="accordion-header">
        Section 2 <span class="arrow">▼</span>
      </button>
      <div class="accordion-content">
        <p>This is the content for Section 2. You can put any text or elements here.</p>
      </div>
    </div>

    <div class="accordion-section">
      <button class="accordion-header">
        Section 3 <span class="arrow">▼</span>
      </button>
      <div class="accordion-content">
        <p>This is the content for Section 3. You can put any text or elements here.</p>
      </div>
    </div>
  </div>

  <script src="menu.js"></script>
</body>
</html>
