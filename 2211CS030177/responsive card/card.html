<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Responsive Card</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #87ceeb; 
      font-family: Arial, sans-serif;
    }

    .card-container {
      perspective: 1000px;
      width: 300px;
    }

    .card {
      position: relative;
      width: 100%;
      height: 200px;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .card:hover, .card.flipped {
      transform: rotateY(180deg);
    }

    .card-side {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      background: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .card-back {
      transform: rotateY(180deg);
    }

    button {
      margin-top: 10px;
      padding: 8px 16px;
      background: #007acc;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div class="card" id="card">
      <div class="card-side card-front">
        <div>
          <h3>Front Side</h3>
          <button onclick="flipCard()">More Info</button>
        </div>
      </div>
      <div class="card-side card-back">
        <div>
          <h3>Back Side</h3>
          <button onclick="flipCard()">Go Back</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    function flipCard() {
      card.classList.toggle('flipped');
    }
  </script>
</body>
</html>
