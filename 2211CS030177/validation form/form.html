<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline Form Validation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #8e25c7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .form-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .error {
      color: red;
      font-size: 12px;
      margin-top: 5px;
    }

    .success {
      color: green;
      font-size: 12px;
      margin-top: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #007acc;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>

<div class="form-container">
  <form id="validationForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">
      <div class="error" id="emailError"></div>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">
      <div class="error" id="passwordError"></div>
    </div>
    <button type="submit">Submit</button>
  </form>
</div>

<script>
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const emailError = document.getElementById('emailError');
  const passwordError = document.getElementById('passwordError');

  // Email validation
  emailInput.addEventListener('input', () => {
    const emailValue = emailInput.value;
    if (!emailValue) {
      emailError.textContent = 'Email is required.';
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue)) {
      emailError.textContent = 'Enter a valid email.';
    } else {
      emailError.textContent = '';
    }
  });

  // Password validation
  passwordInput.addEventListener('input', () => {
    const passwordValue = passwordInput.value;
    if (!passwordValue) {
      passwordError.textContent = 'Password is required.';
    } else if (passwordValue.length < 6) {
      passwordError.textContent = 'Password must be at least 6 characters.';
    } else {
      passwordError.textContent = '';
    }
  });

  // Form submission validation
  document.getElementById('validationForm').addEventListener('submit', (e) => {
    e.preventDefault();
    if (!emailInput.value || emailError.textContent || 
        !passwordInput.value || passwordError.textContent) {
      alert('Please fix errors before submitting.');
    } else {
      alert('Form submitted successfully!');
    }
  });
</script>

</body>
</html>
