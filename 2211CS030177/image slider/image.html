<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider with Dots</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .slider {
      position: relative;
      width: 80%;
      max-width: 600px;
      height: 300px;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .slides {
      display: flex;
      transition: transform 0.5s ease-in-out;
      width: 300%; /* Three images, 100% each */
    }

    .slides img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Navigation dots */
    .dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background-color: white;
      border: 2px solid #007acc;
      border-radius: 50%;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .dot.active {
      background-color: #007acc;
    }

    /* Hover effect on images */
    .slides img:hover {
      transform: scale(1.05);
      transition: transform 0.5s ease;
    }
  </style>
</head>
<body>

<div class="slider">
  <div class="slides" id="slides">
    <img src="https://hldak.mmtcdn.com/prod-s3-hld-hpcmsadmin/holidays/images/cities/1369/Whisk%20your%20partner%20away%20on%20a%20romantic%20holiday.jpg?crop=259:168&downsize=259:168" alt="Image 1">
    <img src="https://hldak.mmtcdn.com/prod-s3-hld-hpcmsadmin/holidays/images/cities/4945/Perfect%20romantic%20beach%20escapade.jpg?crop=259:168&downsize=259:168" alt="Image 2">
    <img src="https://hldak.mmtcdn.com/prod-s3-hld-hpcmsadmin/holidays/images/cities/1328/E.jpg?crop=259:168&downsize=259:168" alt="Image 3">
  </div>
  <div class="dots" id="dots">
    <div class="dot active" data-index="0"></div>
    <div class="dot" data-index="1"></div>
    <div class="dot" data-index="2"></div>
  </div>
</div>

<script>
  const slides = document.getElementById('slides');
  const dots = document.querySelectorAll('.dot');
  let currentIndex = 0;
  const totalSlides = dots.length;

  // Function to update slider
  function updateSlider(index) {
    slides.style.transform = `translateX(-${index * 100}%)`;
    dots.forEach(dot => dot.classList.remove('active'));
    dots[index].classList.add('active');
  }

  // Dot click event
  dots.forEach(dot => {
    dot.addEventListener('click', () => {
      currentIndex = parseInt(dot.getAttribute('data-index'));
      updateSlider(currentIndex);
    });
  });

  // Auto-play functionality
  setInterval(() => {
    currentIndex = (currentIndex + 1) % totalSlides;
    updateSlider(currentIndex);
  }, 3000); // Change image every 3 seconds
</script>

</body>
</html>
