<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Card</title>
  <style>
    .card {
      perspective: 1000px;
      width: 200px;
      height: 300px;
      margin: 20px auto;
    }
    
    .card-inner {
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      position: relative;
    }
    
    .card:hover .card-inner {
      transform: rotateY(180deg);
    }
    
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
    }
    
    .card-front {
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .card-back {
      background: #f0f0f0;
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-inner">
      <div class="card-front">
        <img src="car.jpg" alt="Card Image">
        <h3>Card Title</h3>
      </div>
      <div class="card-back">
        <p>More info about the card...</p>
      </div>
    </div>
  </div>
  <script>
    // No additional JavaScript is needed for hover flipping.

  </script>
</body>
</html>
