<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion memu</title>
    <link rel="stylesheet" href="menu.css">
</head>
<body>
       <div class="accordion">
        <div class="accordion-item">
            <div class="accordion-header">
                <span>Section 1</span>
                <span class="arrow">&#9660;</span> 
            </div>
            <div class="accordion-content">
                <p>NAME</p>
                <p>CLASS</p>
                <p>BRANCH</p>
            </div>
        </div>
        <div class="accordion-item">
            <div class="accordion-header">
                <span>Section 2</span>
                <span class="arrow">&#9660;</span> 
            </div>
            <div class="accordion-content">
                <p>ROLL NO.</p>
                <p>GMAIL</p>
            </div>
        </div>
        <div class="accordion-item">
            <div class="accordion-header">
                <span>Section 3</span>
                <span class="arrow">&#9660;</span> 
            </div>
            <div class="accordion-content">
                <p>RESUME.</p>
                <p>CV</p>
            </div>
        </div>
    </div>

    <script src="memu.js"></script>

</body>
</html>
