<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Navigation Bar</title>
    <link rel="stylesheet" href="ANB style.css">
</head>
<body>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#Menu">Menu</a></li>
            <li><a href="#About">About</a></li>
            <li><a href="#Gallery">Gallery</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home">
        <div class="section-content">
            <h1>Welcome to the restuarent</h1>
            <p>Experience the finest dining in town.</p>
        </div>
    </section>

    <section id="Menu">
        <div class="section-content">
            <h1>Menu</h1>
            <p>Explore our delicious menu.</p>
        </div>
    </section>

    <section id="About">
        <div class="section-content">
            <h1>About us</h1>
            <p>Learn more about our story</p>
        </div>
    </section>
    <section id="gallery">
        <div class="section-content">
        <h2>Gallery</h2>
        <p>See photos of our restaurant and dishes.</p>
        </div>
    </section>
    <section id="contact">
        <div class="section-content">
        <h2>Contact</h2>
        <p>Get in touch with us.</p>
        </div>
    </section>

    <script src="ANB script.js"></script>

</body>
</html>
