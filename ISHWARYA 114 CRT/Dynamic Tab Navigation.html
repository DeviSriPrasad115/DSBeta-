<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Tab Navigation with Icons</title>
    <link rel="stylesheet" href="DTN style.css">
</head>
<body>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'tab1')">
                <i class="fas fa-home"></i> Home
            </button>
            <button class="tab" onclick="openTab(event, 'tab2')">
                <i class="fas fa-user"></i> Profile
            </button>
            <button class="tab" onclick="openTab(event, 'tab3')">
                <i class="fas fa-cog"></i> Settings
            </button>
            <button class="tab" onclick="openTab(event, 'tab4')">
                <i class="fas fa-chart-bar"></i> Analytics
            </button>
            <button class="tab" onclick="openTab(event, 'tab5')">
                <i class="fas fa-info-circle"></i> About
            </button>
        </div>

        <div id="tab1" class="tabcontent">
            <h3>Home</h3>
            <p>Welcome to the Home tab.</p>
        </div>

        <div id="tab2" class="tabcontent">
            <h3>Profile</h3>
            <p>This is your profile information.</p>
        </div>

        <div id="tab3" class="tabcontent">
            <h3>Settings</h3>
            <p>Customize your settings here.</p>
        </div>

        <div id="tab4" class="tabcontent">
            <h3>Analytics</h3>
            <p>View your analytics data.</p>
        </div>

        <div id="tab5" class="tabcontent">
            <h3>About</h3>
            <p>Information about this application.</p>
        </div>
    </div>

    <script src="DTN script.js"></script>

</body>
</html>
