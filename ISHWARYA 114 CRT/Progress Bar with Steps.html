<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart with Multi-Step Progress Bar</title>
    <link rel="stylesheet" href="PBWS style.css">
</head>
<body>
    <div class="form-container">
        <h2>Shopping Cart</h2>
        
        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <form id="multi-step-form">
            <!-- Step 1: Add to Cart -->
            <div class="step" id="step-1">
                <h3>Step 1: Add Items to Cart</h3>
                <p>Select items to add to your cart:</p>
                <label for="item1">
                    <input type="checkbox" id="item1" name="item1"> T-Shirt ($25)
                </label><br>
                <label for="item2">
                    <input type="checkbox" id="item2" name="item2"> Jeans ($40)
                </label><br>
                <label for="item3">
                    <input type="checkbox" id="item3" name="item3"> Shoes ($60)
                </label><br>
                <button type="button" class="next" onclick="nextStep(1)">Next</button>
            </div>

            <!-- Step 2: Shipping Details -->
            <div class="step" id="step-2">
                <h3>Step 2: Shipping Details</h3>
                <label for="address">Shipping Address:</label>
                <input type="text" id="address" name="address" required><br>
                <label for="city">City:</label>
                <input type="text" id="city" name="city" required><br>
                <label for="zip">ZIP Code:</label>
                <input type="text" id="zip" name="zip" required><br>
                <button type="button" class="next" onclick="nextStep(2)">Next</button>
                <button type="button" class="prev" onclick="prevStep(2)">Previous</button>
            </div>

            <!-- Step 3: Payment Info -->
            <div class="step" id="step-3">
                <h3>Step 3: Payment Information</h3>
                <label for="card-number">Card Number:</label>
                <input type="text" id="card-number" name="card-number" required><br>
                <label for="expiry">Expiry Date:</label>
                <input type="text" id="expiry" name="expiry" required><br>
                <label for="cvv">CVV:</label>
                <input type="text" id="cvv" name="card verification" required><br>
                <button type="button" class="submit" onclick="submitForm()">Submit</button>
                <button type="button" class="prev" onclick="prevStep(3)">Previous</button>
            </div>
        </form>
    </div>

    <script src="PBWS script.js"></script>
</body>
</html>
