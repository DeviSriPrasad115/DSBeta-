<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Flip Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }

        .card-container {
            perspective: 1000px;
            width: 300px;
            height: 400px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            overflow: hidden;
        }

        .card-front {
            background: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card-back {
            background: #2980b9;
            color: #fff;
            transform: rotateY(180deg);
            padding: 20px;
            text-align: center;
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .card-button:hover {
            background-color: #c0392b;
        }

        @media (max-width: 768px) {
            .card-container {
                width: 90%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div>
                    <h2 class="card-title">Card Title</h2>
                    <img src="https://via.placeholder.com/300x200" alt="Card Image" class="card-image">
                    <button class="card-button" onclick="toggleFlip()">More Info</button>
                </div>
            </div>
            <div class="card-face card-back">
                <p>Here is more information about this card. You can add details here or even links.</p>
                <button class="card-button" onclick="toggleFlip()">Back</button>
            </div>
        </div>
    </div>
    <script>
        function toggleFlip() {
            const card = document.getElementById('card');
            card.classList.toggle('flipped');
        }
    </script>
</body>
</html>
