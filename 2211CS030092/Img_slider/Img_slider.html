<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider with Dots</title>
  <link rel="stylesheet" href="imdslider.css">
</head>
<body>
  <div class="slider">
    <div class="slides">
      <img src="https://tse2.mm.bing.net/th?id=OIP.NUviliNlox6iY7DQUWLTSQHaEK&pid=Api&P=0&h=180text=Image+1" alt="Image 1">
      <img src="https://tse1.mm.bing.net/th?id=OIP.NQ-DWXpMfyQpz_dIx4B3cQHaEK&pid=Api&P=0&h=180text=Image+2" alt="Image 2">
      <img src="https://tse2.mm.bing.net/th?id=OIP.NUviliNlox6iY7DQUWLTSQHaEK&pid=Api&P=0&h=180text=Image+3" alt="Image 3">
    </div>
    <div class="dots">
      <span class="dot active" data-index="0"></span>
      <span class="dot" data-index="1"></span>
      <span class="dot" data-index="2"></span>
    </div>
  </div>
  <script src="imgslider.js"></script>
</body>
</html>
