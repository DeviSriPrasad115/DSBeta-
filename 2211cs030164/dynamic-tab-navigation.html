<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .entire{
            width: 100vw;
            height: 100vh;
        }
        #content{
            height:90%;
            width:100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1s;
        }
        .tabs{
            display: flex;
            width: 100%;
            height: 10%;

            align-items: center;
        }
        .tabs div{
            width:100%;
            height:100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border:2px solid black;
            cursor:pointer;
        }
        .tabs div:focus{
            outline: none;
            background-color: green;
            transition:all 1s;
        }
    </style>
</head>
<body>
    <div class="entire">
        <div class="tabs">
            <div tabindex="0" id="content1">Content 1</div>
            <div tabindex="0" id="content2">Content 2</div>
            <div tabindex="0" id="content3">Content 3</div>
            <div tabindex="0" id="content4">Content 4</div>
        </div>
        <div id="content">
            content
        </div>
    </div>
    <script>
        let content1button = document.getElementById("content1");
let content2button = document.getElementById("content2");
let content3button = document.getElementById("content3");
let content4button = document.getElementById("content4");
let content = document.getElementById("content");
content1button.addEventListener("click", function() {
    content.textContent = "content1";
    content.style.backgroundColor="yellow";
});
content2button.addEventListener("click", function() {
    content.textContent = "content2";
    content.style.backgroundColor="pink";
});
content3button.addEventListener("click", function() {
    content.textContent = "content3";
    content.style.backgroundColor="blue";
});
content4button.addEventListener("click", function() {
    content.textContent = "content4";   
    content.style.backgroundColor="gray";
});
let buttons = [content1button,content2button,content3button,content4button];
let trackbuttons = -1;
document.addEventListener('keydown',(e)=>{
    e.preventDefault();
    trackbuttons = (trackbuttons + 1) % buttons.length;
    let currentbutton = buttons[trackbuttons];
    if(e.key==="Tab"){
        currentbutton.focus();
        currentbutton.click();
    }
})
    </script>
</body>
</html>
