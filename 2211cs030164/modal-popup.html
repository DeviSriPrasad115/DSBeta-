    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Modal</title>
        <style>
            *{
                margin: 0;padding: 0;
            }
            .entire{
                height: 100vh;
                width: 100vw;
            }
            .button-class{
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .bgblack{
                background-color: yellow;
                opacity: 0.5;
                transition: all;
            }
            .bgwhite{
                background-color: white;
            }
            .model {
                background-color: lightblue;
                height: 75%;
                width: 75%;
                position: fixed;
                top:15%;left:15%;
                z-index: 1000;
                display: none;
                justify-content: center;
                align-items: center;
                border:2px;
                border-radius:5px;
            }
            
            .model.show {
                display: flex;
            }
            .close{
                position:absolute;
                right:5px;
                top:0px;
                border:none;
                background: none;
            }
        </style>
    </head>
    <body>
        <div class="entire">
            <div class="button-class">
                <button class="click">Click Me</button>
            </div>
            <div class="model">
                <div>Hello</div>
                <button class="close">X</button>
            </div>
        </div>
        <script>
            let modal = document.querySelector(".model");
let openButton = document.querySelector(".click");
let closeButton = document.querySelector(".close");
let divbutton = document.querySelector(".button-class");
openButton.addEventListener("click", () => {
  modal.classList.add("show");
    divbutton.classList.remove("bgwhite");
    divbutton.classList.add("bgblack");
});

closeButton.addEventListener("click", () => {
    modal.classList.remove("show");
    divbutton.classList.remove("bgblack");
    divbutton.classList.add("bgwhite");
});

        </script>
    </body>
    </html>
