<!DOCTYPE html>
<html>
<head>
<title>Responsive Image Gallery with Filtering</title>
<link rel="stylesheet" href="responsivegallery.css">
</head>
<body>

<h1>Image Gallery</h1>

<div class="filters">
  <button class="active" data-filter="all">All</button>
  <button data-filter="Mountains">Mountains</button>
  <button data-filter="Car">Car</button>
  <button data-filter="Nature">Nature</button>
</div>

<div class="image-grid">
    <img src="https://static.vecteezy.com/system/resources/thumbnails/026/542/204/small_2x/landscape-natural-beautiful-mountains-and-blue-sky-panorama-photo.jpg" alt="Mountains 1" class="img-item Mountains">
    <img src="https://plus.unsplash.com/premium_photo-1672115680958-54438df0ab82?fm=jpg&q=60&w=3000&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8bW91bnRhaW5zfGVufDB8fDB8fHww" alt="Mountains 2" class="img-item Mountains">
    <img src="https://t3.ftcdn.net/jpg/00/84/22/12/360_F_84221257_rfefWUrMTssPWFD16GSArJaLodR3sO8a.jpg" alt="Mountains 3" class="img-item Mountains">
    <img src="https://imageio.forbes.com/specials-images/imageserve/5d35eacaf1176b0008974b54/0x0.jpg?format=jpg&crop=4560,2565,x790,y784,safe&height=600&width=1200&fit=bounds" alt="Car 1" class="img-item Car">
    <img src="https://c.ndtvimg.com/2022-02/he0o79p_skoda-slavia_625x300_28_February_22.jpg" alt="Car 2" class="img-item Car">
    <img src="https://img.freepik.com/premium-photo/modern-automobile-classic-technology-wheel-traffic_665346-119.jpg" alt="Car 3" class="img-item Car">
    <img src="https://www.bsr.org/images/heroes/bsr-focus-nature-hero.jpg" alt="Nature 1" class="img-item Nature">
    <img src="https://d2rqvd0kuag1qx.cloudfront.net/_1280xAUTO_crop_center-center_none/092717_NatureMuseum-473_2024-03-28-194159_jaul.jpg" alt="Nature 2" class="img-item Nature">
    <img src="https://t3.ftcdn.net/jpg/02/87/90/92/240_F_287909239_K8bMpb0M9oUyOI8zrdqpKPQnIlC73WfD.jpg" alt="Nature 3" class="img-item Nature">
    <img src="https://www.wallartprints.com.au/blog/wp-content/uploads/2017/10/hummingbird-nature-pictures-98278440.jpg" alt="Nature 4" class="img-item Nature">
  </div>
  <script src="responsivegallery.js"></script>

  </body>
</html>
