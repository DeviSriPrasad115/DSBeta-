<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Screen Accordion Menu</title>
    <link rel="stylesheet" href="accstyle.css">
</head>
<body>
    <div class="accordion">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <span class="arrow">+</span> 
                Starters
            </h2>
            <div class="accordion-content">
                <p>Veg manchuria</p>
                <p>Corn manchuria</p>
                <p>Chicken tikka</p>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <span class="arrow">+</span> 
                Main Courses
            </h2>
            <div class="accordion-content">
                <p>Veg biryani</p>
                <p>Chicken biryani</p>
                <p> Paneer biryani </p>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <span class="arrow">+</span> 
                Desserts
            </h2>
            <div class="accordion-content">
                <p>Tiramisu</p>
                <p>Chocolate Lava Cake</p>
                <p>Cheesecake</p>
            </div>
        </div>
    </div>

    <script src="accstyle.css"></script>
</body>
</html>
