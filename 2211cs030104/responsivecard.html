<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Card Slider</title>
    <link rel="stylesheet" href="responsivecard.css">
</head>
<body>
    <div class="slider">
        <button class="prev">&#10094;</button>
        <div class="card-container">
            <div class="card">
                <img src="https://static-00.iconduck.com/assets.00/person-icon-950x1024-fy2qylik.png" alt="Profile Picture">
                <h3>James Wilson</h3>
                <p>Software Developer</p>
                <button class="message-btn">Message</button>
            </div>
            <div class="card">
                <img src="https://static-00.iconduck.com/assets.00/person-icon-950x1024-fy2qylik.png" alt="Profile Picture">
                <h3>Zoe Olivia</h3>
                <p>Fashion Designer</p>
                <button class="message-btn">Message</button>
            </div>
            <div class="card">
                <img src="https://static-00.iconduck.com/assets.00/person-icon-950x1024-fy2qylik.png" alt="Profile Picture">
                <h3>David Brown</h3>
                <p>Graphic Designer</p>
                <button class="message-btn">Message</button>
            </div>
        </div>
        <button class="next">&#10095;</button>
    </div>
    <script src="responsivecard.js"></script>
</body>
</html>
