<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Tab Image Filter</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tabs {
            display: flex;
            margin: 20px 0;
            border-bottom: 2px solid #ddd;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            margin: 0 5px;
            border-radius: 5px 5px 0 0;
            background-color: #eee;
            transition: background-color 0.3s, color 0.3s;
        }

        .tab:hover {
            background-color: #ddd;
        }

        .tab.active {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
        }

        .image-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            width: 80%;
            max-width: 1000px;
            margin: 20px 0;
        }

        .image-container img {
            width: 100%;
            border-radius: 10px;
            transition: transform 0.3s, opacity 0.3s;
            opacity: 0;
            transform: scale(0.9);
        }

        .image-container img.visible {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>
    <h1>Dynamic Tab Image Filter</h1>
    <div class="tabs">
        <div class="tab active" data-category="all">All</div>
        <div class="tab" data-category="nature">Nature</div>
        <div class="tab" data-category="city">City</div>
        <div class="tab" data-category="animals">Animals</div>
    </div>

    <div class="image-container">
        <!-- Nature images -->
        <img src="https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="Nature 1" data-category="nature" class="visible">
        <img src="https://images.unsplash.com/photo-1511604392336-5017c49e678f?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="Nature 2" data-category="nature" class="visible">
        
        <!-- City images -->
        <img src="https://images.unsplash.com/photo-1546947916-c199885eb850?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="City 1" data-category="city" class="visible">
        <img src="https://images.unsplash.com/photo-1597367798045-f61c2d1306a4?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="City 2" data-category="city" class="visible">
        <img src="https://images.unsplash.com/photo-1526821340789-508e9e9b11d6?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="City 3" data-category="city" class="visible">

        <!-- Animals images -->
        <img src="https://images.unsplash.com/photo-1583454500860-6b1b57743899?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="Animals 1" data-category="animals" class="visible">
        <img src="https://images.unsplash.com/photo-1589395647551-3ca3b7b5f9b2?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="Animals 2" data-category="animals" class="visible">
        <img src="https://images.unsplash.com/photo-1612839759291-c82c67edb7f9?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="Animals 3" data-category="animals" class="visible">
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const images = document.querySelectorAll('.image-container img');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Remove active class from all tabs and add to clicked tab
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Filter images based on tab's data-category
                const category = tab.dataset.category;
                images.forEach(img => {
                    if (category === 'all' || img.dataset.category === category) {
                        img.classList.add('visible');
                    } else {
                        img.classList.remove('visible');
                    }
                });
            });
        });
    </script>
</body>
</html>
