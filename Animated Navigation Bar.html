<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Navigation Bar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: #333;
            display: flex;
            justify-content: center;
            padding: 10px 0;
            z-index: 1000;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            position: relative;
        }

        .navbar a:hover {
            color: #0ec135;
        }

        .navbar a::after {
            content: "";
            display: block;
            width: 0;
            height: 2px;
            background: #a70c61;
            transition: width 0.3s;
            margin: 0 auto;
        }

        .navbar a:hover::after {
            width: 100%;
        }

        .active {
            color: #ff9900;
        }

        section {
            height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        #home {
            background: #d2d435;
        }

        #about {
            background: #9e3636;
        }

        #services {
            background: #0f578d;
        }

        #contact {
            background: #c4a7b2;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="#home" id="link-home">Home</a>
        <a href="#about" id="link-about">About</a>
        <a href="#services" id="link-services">Services</a>
        <a href="#contact" id="link-contact">Contact</a>
    </div>

    <section id="home">Home Section</section>
    <section id="about">About Section: Here we can tell yourself</section>
    <section id="services">Services Section: your services</section>
    <section id="contact">Contact Section: you can share your contact information</section>

    <script>
        const links = document.querySelectorAll('.navbar a');
        const sections = document.querySelectorAll('section');

        window.addEventListener('scroll', () => {
            let current = '';

            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                const sectionHeight = section.clientHeight;
                if (pageYOffset >= sectionTop - sectionHeight / 3) {
                    current = section.getAttribute('id');
                }
            });

            links.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href').includes(current)) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
