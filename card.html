<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Card with Flip Effect</title>
  <style>
    /* Reset and general styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f4f4f4;
      padding: 20px;
    }

    .card-container {
      perspective: 1000px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 300px;
      height: 400px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
      cursor: pointer;
    }

    .card:hover {
      transform: rotateY(180deg);
    }

    .card-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .card-front {
      background-color: #fff;
    }

    .card-back {
      background-color: #007bff;
      color: white;
      transform: rotateY(180deg);
      display: none; /* Initially hidden */
      align-items: flex-start;
      padding-top: 50px;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    .more-info {
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
    }

    .more-info:hover {
      background-color: #218838;
    }

    /* Toggle Button Styling */
    .toggle-btn {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .toggle-btn:hover {
      background-color: #0056b3;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .card {
        width: 250px;
        height: 350px;
      }
    }

    @media (max-width: 480px) {
      .card {
        width: 200px;
        height: 300px;
      }
    }
  </style>
</head>
<body>

  <!-- Card Container -->
  <div class="card-container">
    <div class="card" id="card">
      <div class="card-inner">
        <!-- Front of the card -->
        <div class="card-front">
          <div>
            <h2 class="card-title">Card Title</h2>
            <img src="images.jepg" alt="Image" class="card-img">
            <button class="more-info" id="moreInfoBtn">More Info</button>
          </div>
        </div>
        < Back of the card>
        <div class="card-back">
          <h3>Additional Information</h3>
          <p>This is some more information that can be toggled on the back of the card.</p>
        </div>
      </div>
    </div>
  </div>

  <Toggle Button>
  <button class="toggle-btn" id="toggleBtn">Toggle Flip</button>

  <script>
    // References to DOM elements
    const card = document.getElementById('card');
    const toggleBtn = document.getElementById('toggleBtn');
    const moreInfoBtn = document.getElementById('moreInfoBtn');
    const cardBack = document.querySelector('.card-back');

    // Toggle card flip using button
    toggleBtn.addEventListener('click', () => {
      card.classList.toggle('flipped');
    });

    // Show more info on button click (for now, just toggle visibility of card back)
    moreInfoBtn.addEventListener('click', () => {
      cardBack.style.display = (cardBack.style.display === 'none' || cardBack.style.display === '') ? 'block' : 'none';
    });
  </script>

</body>
</html>
