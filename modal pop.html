<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Pop-up</title>
  <link rel="stylesheet" href="style5.css">
</head>
<body>

  <!-- Trigger button to open the modal -->
  <button id="openModalBtn" class="open-modal-btn">Open Modal</button>

  <!-- The Modal -->
  <div id="myModal" class="modal">
    <!-- Modal content -->
    <div class="modal-content">
      <span id="closeModalBtn" class="close-btn">&times;</span>
      <h2>Modal Header</h2>
      <p>This is a simple modal pop-up with an overlay.</p>
      <button id="closeModalBtn2" class="close-modal-btn">Close Modal</button>
    </div>
  </div>

  <script src="javascript5.js"></script>
</body>
</html>
