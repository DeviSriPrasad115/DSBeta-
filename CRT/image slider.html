<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider with Dots</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        /* Image Slider Container */
        .slider-container {
            position: relative;
            width: 80%;
            max-width: 600px;
            overflow: hidden;
            border-radius: 10px;
        }

        /* Image Slider Wrapper */
        .slider-wrapper {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slider-wrapper img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* Navigation Dots */
        .dots-container {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .dot:hover {
            background-color: rgba(255, 255, 255, 1);
        }

        .active {
            background-color: rgba(255, 255, 255, 1);
        }

        /* Hover Effect for Image */
        .slider-wrapper img:hover {
            opacity: 0.9;
            transform: scale(1.05);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <div class="slider-wrapper">
            <img src="https://images.pexels.com/photos/459225/pexels-photo-459225.jpeg?cs=srgb&dl=daylight-environment-forest-459225.jpg&fm=jpg" alt="Image 1">
            <img src="https://images.pexels.com/photos/14293781/pexels-photo-14293781.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" alt="Image 2">
            <img src="https://th.bing.com/th/id/OIP.58PKYLKzaiqWhQuOURXzqwHaFj?w=1024&h=768&rs=1&pid=ImgDetMain" alt="Image 3">
        </div>

        <div class="dots-container">
            <div class="dot" data-slide="0"></div>
            <div class="dot" data-slide="1"></div>
            <div class="dot" data-slide="2"></div>
        </div>
    </div>

    <script>
        const images = document.querySelectorAll('.slider-wrapper img');
        const dots = document.querySelectorAll('.dot');
        const sliderWrapper = document.querySelector('.slider-wrapper');

        let currentSlide = 0;
        const totalSlides = images.length;

        // Function to change slide
        function changeSlide() {
            // Update the current slide position
            sliderWrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
            
            // Remove active class from all dots and add it to the current dot
            dots.forEach(dot => dot.classList.remove('active'));
            dots[currentSlide].classList.add('active');
        }

        // Add click event to dots
        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                currentSlide = parseInt(dot.getAttribute('data-slide'));
                changeSlide();
            });
        });

        // Auto-play function
        function autoPlay() {
            currentSlide = (currentSlide + 1) % totalSlides;
            changeSlide();
        }

        // Set auto-play interval (change every 3 seconds)
        let autoPlayInterval = setInterval(autoPlay, 3000);

        // Change slide on load
        changeSlide();
    </script>

</body>
</html>
