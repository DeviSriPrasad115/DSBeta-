<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose a Theme</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dropdown">
    <button class="dropdown-btn" id="dropdownButton">Choose a Theme</button>
    <ul class="dropdown-menu" id="dropdownMenu">
      <li class="dropdown-item" data-theme="light">Light Theme</li>
      <li class="dropdown-item" data-theme="dark">Dark Theme</li>
      <li class="dropdown-item" data-theme="blue">Blue Theme</li>
    </ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
