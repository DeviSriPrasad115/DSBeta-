<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <div class="container">
        <h1>Responsive Image Gallery</h1>
        <div class="filter-buttons">
            <button class="filter-btn" data-filter="all">All</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="animals">Animals</button>
        </div>
        <div class="gallery">
            <div class="gallery-item nature">
                <img src="https://wallpapers.com/images/hd/nature-landscape-pictures-hg4ndx87jp1rsvth.jpg" alt="Nature Image 1">
                <div class="hover-text">Nature Image 1</div>
            </div>
            <div class="gallery-item animals">
                <img src="https://tse1.mm.bing.net/th?id=OIP.FRZh6FryVcYvQa5KVRpUCwAAAA&pid=Api&P=0&h=180" alt="Dog">
                <div class="hover-text">Dog</div>
            </div>
            <div class="gallery-item nature">
                <img src="https://wallpaperaccess.com/full/36301.jpg" alt="Nature Image 2">
                <div class="hover-text">Nature Image 2</div>
            </div>
            <div class="gallery-item animals">
                <img src="https://tse4.mm.bing.net/th?id=OIP.P0gRKNwz8DU8LusTc36IGwHaE6&pid=Api&P=0&h=180" alt="Deer">
                <div class="hover-text">Deer</div>
            </div>
            <div class="gallery-item nature">
                <img src="https://static.vecteezy.com/system/resources/previews/022/575/456/large_2x/chamomile-flower-field-camomile-in-the-nature-field-of-camomiles-at-sunny-day-at-nature-camomile-daisy-flowers-in-summer-day-chamomile-flowers-field-wide-background-in-sun-light-generative-ai-photo.jpg" alt="Nature Image 2">
                <div class="hover-text">Nature Image 3</div>
            </div>
            <div class="gallery-item animals">
                <img src="https://static.stacker.com/s3fs-public/2018-09/shutterstock_1184605060_0.jpg" alt="PolarBear">
                <div class="hover-text">PolarBear</div>
            </div>
        </div>
    </div>
    <script src="gallery.js"></script>
</body>
</html>
