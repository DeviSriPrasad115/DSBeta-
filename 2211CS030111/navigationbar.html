<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Navigation Bar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #333;
      padding: 10px 0;
      z-index: 1000;
    }

    .navbar ul {
      display: flex;
      justify-content: center;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .navbar li {
      margin: 0 20px;
    }

    .navbar a {
      text-decoration: none;
      color: white;
      font-size: 18px;
      padding: 10px;
      transition: all 0.3s ease;
    }

    .navbar a:hover {
      background-color: #575757;
      border-radius: 5px;
    }

    .section {
      height: 100vh;
      padding: 20px;
      background-color: #f4f4f4;
      margin-top: 60px;
    }

    .active {
      background-color: #ff6347;
      color: white;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <ul>
      <li><a href="#section1" class="nav-link">Home</a></li>
      <li><a href="#section2" class="nav-link">About</a></li>
      <li><a href="#section3" class="nav-link">Services</a></li>
      <li><a href="#section4" class="nav-link">Contact</a></li>
    </ul>
  </nav>

  <div id="section1" class="section">Home Section</div>
  <div id="section2" class="section">About Section</div>
  <div id="section3" class="section">Services Section</div>
  <div id="section4" class="section">Contact Section</div>

  <script>
    // Highlight active section on scroll
    const links = document.querySelectorAll('.nav-link');
    const sections = document.querySelectorAll('.section');

    window.addEventListener('scroll', () => {
      let current = '';
      
      sections.forEach(section => {
        const sectionTop = section.offsetTop;
        const sectionHeight = section.clientHeight;
        
        if (pageYOffset >= sectionTop - sectionHeight / 3) {
          current = section.getAttribute('id');
        }
      });

      links.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href').substring(1) === current) {
          link.classList.add('active');
        }
      });
    });
  </script>

</body>
</html>
