<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Tab Navigation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    /* Tab Navigation Styles */
    .tabs {
      display: flex;
      border-bottom: 2px solid #ccc;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 20px;
      cursor: pointer;
      background-color: #f4f4f4;
      border: 1px solid #ccc;
      border-radius: 5px 5px 0 0;
      transition: background-color 0.3s ease;
      margin-right: 10px;
    }

    .tab:hover {
      background-color: #ddd;
    }

    .tab.active {
      background-color: #4caf50;
      color: white;
      font-weight: bold;
    }

    /* Content Section Styles */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Optional animation for content */
    .tab-content {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .tab-content.active {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Tab Navigation -->
  <div class="tabs">
    <div class="tab active" onclick="showTab(0)">Tab 1</div>
    <div class="tab" onclick="showTab(1)">Tab 2</div>
    <div class="tab" onclick="showTab(2)">Tab 3</div>
  </div>

  <!-- Tab Content Sections -->
  <div class="tab-content active">
    <h2>Content for Tab 1</h2>
    <p>This is the content for the first tab.</p>
  </div>
  <div class="tab-content">
    <h2>Content for Tab 2</h2>
    <p>This is the content for the second tab.</p>
  </div>
  <div class="tab-content">
    <h2>Content for Tab 3</h2>
    <p>This is the content for the third tab.</p>
  </div>

  <script>
    // Function to show the clicked tab and its content
    function showTab(index) {
      const tabs = document.querySelectorAll('.tab');
      const contents = document.querySelectorAll('.tab-content');

      // Deactivate all tabs and hide all content
      tabs.forEach(tab => tab.classList.remove('active'));
      contents.forEach(content => content.classList.remove('active'));

      // Activate the clicked tab and show the corresponding content
      tabs[index].classList.add('active');
      contents[index].classList.add('active');
    }
  </script>

</body>
</html>
