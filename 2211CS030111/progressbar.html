<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Step Form with Progress Bar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    /* Form container */
    .form-container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* Progress bar container */
    .progress-container {
      width: 100%;
      height: 20px;
      background-color: #f3f3f3;
      border-radius: 10px;
      margin-bottom: 20px;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background-color: #4caf50;
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    /* Step navigation buttons */
    .step-navigation {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .step-navigation button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .step-navigation button:disabled {
      background-color: #bbb;
      cursor: not-allowed;
    }

    /* Form steps */
    .form-step {
      display: none;
    }

    .form-step.active {
      display: block;
    }

    /* Step indicator circles */
    .step-indicators {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .step-indicator {
      width: 20px;
      height: 20px;
      margin: 0 5px;
      background-color: #bbb;
      border-radius: 50%;
      transition: background-color 0.3s ease;
    }

    .step-indicator.active {
      background-color: #4caf50;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <!-- Progress Bar -->
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>

    <!-- Step Indicators -->
    <div class="step-indicators">
      <div class="step-indicator"></div>
      <div class="step-indicator"></div>
      <div class="step-indicator"></div>
    </div>

    <!-- Form Steps -->
    <div class="form-step active">
      <h2>Step 1: Personal Information</h2>
      <input type="text" placeholder="Name" required><br><br>
      <input type="email" placeholder="Email" required><br><br>
    </div>
    <div class="form-step">
      <h2>Step 2: Address</h2>
      <input type="text" placeholder="Street Address" required><br><br>
      <input type="text" placeholder="City" required><br><br>
    </div>
    <div class="form-step">
      <h2>Step 3: Confirmation</h2>
      <p>Review your information and submit.</p>
    </div>

    <!-- Step Navigation Buttons -->
    <div class="step-navigation">
      <button id="prev" disabled>Previous</button>
      <button id="next">Next</button>
    </div>
  </div>

  <script>
    const steps = document.querySelectorAll('.form-step');
    const progressBar = document.querySelector('.progress-bar');
    const stepIndicators = document.querySelectorAll('.step-indicator');
    const prevButton = document.getElementById('prev');
    const nextButton = document.getElementById('next');

    let currentStep = 0;

    // Update form and progress bar
    function updateForm() {
      // Show current step
      steps.forEach((step, index) => {
        step.classList.toggle('active', index === currentStep);
      });

      // Update progress bar width
      const progress = ((currentStep + 1) / steps.length) * 100;
      progressBar.style.width = progress + '%';

      // Update step indicators
      stepIndicators.forEach((indicator, index) => {
        indicator.classList.toggle('active', index <= currentStep);
      });

      // Enable/disable buttons based on step
      prevButton.disabled = currentStep === 0;
      nextButton.disabled = currentStep === steps.length - 1;
    }

    // Navigate to next step
    nextButton.addEventListener('click', () => {
      if (currentStep < steps.length - 1) {
        currentStep++;
        updateForm();
      }
    });

    // Navigate to previous step
    prevButton.addEventListener('click', () => {
      if (currentStep > 0) {
        currentStep--;
        updateForm();
      }
    });

    // Initialize the form
    updateForm();
  </script>

</body>
</html>
