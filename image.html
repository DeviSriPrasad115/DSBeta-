<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="slider-container">
    <div class="slider">
      <div class="slide" id="slide1"><img src="https://via.placeholder.com/800x300?text=Image+1" alt="Image 1"></div>
      <div class="slide" id="slide2"><img src="https://via.placeholder.com/800x300?text=Image+2" alt="Image 2"></div>
      <div class="slide" id="slide3"><img src="https://via.placeholder.com/800x300?text=Image+3" alt="Image 3"></div>
    </div>
    <div class="dots">
      <span class="dot" data-slide="1"></span>
      <span class="dot" data-slide="2"></span>
      <span class="dot" data-slide="3"></span>
    </div>
  </div>

  <script src="javascript.js"></script>
</body>
</html>
