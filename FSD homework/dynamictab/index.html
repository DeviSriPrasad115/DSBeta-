<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Tab Navigation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tab-container">
    <div class="tabs">
      <div class="tab active" data-tab="tab1">Tab 1</div>
      <div class="tab" data-tab="tab2">Tab 2</div>
      <div class="tab" data-tab="tab3">Tab 3</div>
    </div>
    <div class="content-container">
      <div id="tab1" class="content active">This is content for Tab 1.</div>
      <div id="tab2" class="content">This is content for Tab 2.</div>
      <div id="tab3" class="content">This is content for Tab 3.</div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
