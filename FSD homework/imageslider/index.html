<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="slider">
    <div class="slides">
      <div class="slide"><img src="https://tse2.mm.bing.net/th?id=OIP.4P9PWumTMMHeCCZbGekNngHaHa&pid=Api&P=0&h=180" alt="Slide 1"></div>
      <div class="slide"><img src="https://tse4.mm.bing.net/th?id=OIP.ypVv-YH56K6FRsLYfKreWgHaHa&pid=Api&P=0&h=180" alt="Slide 2"></div>
      <div class="slide"><img src="https://tse2.mm.bing.net/th?id=OIP.OF4YM8ZsL914Jir_XZ3VwwHaHa&pid=Api&P=0&h=180" alt="Slide 3"></div>
    </div>
    <div class="navigation">
      <button class="nav-btn prev">&lt;</button>
      <button class="nav-btn next">&gt;</button>
    </div>
    <div class="dots">
      <div class="dot active" data-index="0"></div>
      <div class="dot" data-index="1"></div>
      <div class="dot" data-index="2"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
