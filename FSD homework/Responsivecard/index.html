<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Card with Flip Effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card-container">
    <div class="card">
      <div class="card-front">
        <img src="https://tse3.mm.bing.net/th?id=OIP.m2lDShr5d2Bw15qnlodwxQHaHa&pid=Api&P=0&h=180" alt="Card Image">
        <h2>Card Title</h2>
        <button class="toggle-button">More Info</button>
      </div>
      <div class="card-back">
        <p>Here is more information about the card. You can customize this content as needed.</p>
        <button class="toggle-button">Back</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
