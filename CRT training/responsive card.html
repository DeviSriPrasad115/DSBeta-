<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Card with Flip</title>
    <link rel="stylesheet" href="responsive card.css">
</head>
<body>
    <div class="card-container">
    <div class="card" id="card">
        <div class="card-front">
            <img src="https://codingartistweb.com/wp-content/uploads/2020/10/grid-cards-small-01-1024x576.png" alt="Card Image">
        </div>
        <div class="card-back">
            <p>More Info: This is the back of the card.</p>
        </div>
    </div>
    <button id="toggleButton">Toggle Flip</button>
</div>
<script src="responsive card.js"></script>
</body>
</html>
