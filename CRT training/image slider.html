<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider with Dots</title>
    <link rel="stylesheet" href="imageslider.css">
</head>
<body>
    <div class="slider">
        <div class="slides">
            <div class="slide">
                <img src="https://wallpapercave.com/wp/Ex9MlTC.jpg" alt="Image 1">
            </div>
            <div class="slide">
                <img src="https://tse2.mm.bing.net/th?id=OIP.juDo8a_p5VtZ7imXbO5ErQHaEK&pid=Api&P=0&h=180" alt="Image 2">
            </div>
            <div class="slide">
                <img src="https://wallup.net/wp-content/uploads/2016/06/23/393603-mountains-nature-forest-water-landscape-rock.jpg" alt="Image 3">
            </div>
        </div>
        <div class="dots">
            <div class="dot" data-index="0"></div>
            <div class="dot" data-index="1"></div>
            <div class="dot" data-index="2"></div>
        </div>
    </div>
    <script src="imageslider.js"></script>
</body>
</html>
