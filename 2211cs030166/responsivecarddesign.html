<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Card</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f0f0; font-family: Arial; }
        .card-container { perspective: 1000px; width: 300px; height: 200px; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; }
        .card-front { background: #fff; }
        .card-back { background: #4CAF50; color: white; transform: rotateY(180deg); }
        button { margin-top: 20px; padding: 10px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card" id="flipCard">
            <div class="card-face card-front">Front</div>
            <div class="card-face card-back">Back</div>
        </div>
    </div>
    <button onclick="toggleCard()">Flip Card</button>
    <script>
        function toggleCard() {
            document.getElementById('flipCard').classList.toggle('flipped');
        }
    </script>
</body>
</html>
