<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
        .slider { position: relative; width: 300px; overflow: hidden; }
        .slides { display: flex; transition: transform 0.5s ease; }
        .slide { width: 300px; }
        .dots { display: flex; justify-content: center; margin-top: 10px; }
        .dot { width: 10px; height: 10px; background: #ccc; border-radius: 50%; margin: 0 5px; cursor: pointer; }
        .dot.active { background: #4CAF50; }
    </style>
</head>
<body>
    <div class="slider" id="slider">
        <div class="slides">
            <img src="https://via.placeholder.com/300x200?text=1" class="slide">
            <img src="https://via.placeholder.com/300x200?text=2" class="slide">
            <img src="https://via.placeholder.com/300x200?text=3" class="slide">
        </div>
    </div>
    <div class="dots" id="dots">
        <div class="dot" onclick="goToSlide(0)"></div>
        <div class="dot" onclick="goToSlide(1)"></div>
        <div class="dot" onclick="goToSlide(2)"></div>
    </div>
    <script>
        const slides = document.querySelector('.slides');
        const dots = document.querySelectorAll('.dot');
        let currentIndex = 0;

        function updateSlider() {
            slides.style.transform = `translateX(-${currentIndex * 300}px)`;
            dots.forEach((dot, idx) => dot.classList.toggle('active', idx === currentIndex));
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlider();
        }

        setInterval(() => {
            currentIndex = (currentIndex + 1) % dots.length;
            updateSlider();
        }, 3000);

        updateSlider();
    </script>
</body>
</html>
