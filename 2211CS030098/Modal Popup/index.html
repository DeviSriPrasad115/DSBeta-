<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Popup Example</title>
  <style>
    /* General Styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f7fc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Button to open the modal */
    .open-modal-btn {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
    }

    .open-modal-btn:hover {
      background-color: #0056b3;
    }

    /* The Modal (hidden by default) */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
      transition: opacity 0.3s ease;
    }

    /* Modal Content */
    .modal-content {
      position: relative;
      margin: 15% auto;
      padding: 20px;
      width: 80%;
      max-width: 400px;
      background-color: white;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 18px;
    }

    /* Close button */
    .close-btn {
      font-size: 24px;
      cursor: pointer;
      background: none;
      border: none;
      color: #333;
      transition: color 0.3s;
    }

    .close-btn:hover {
      color: #ff0000;
    }

    /* Modal Body */
    .modal-body {
      margin-top: 10px;
    }

    /* Modal footer */
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .modal-footer button {
      padding: 8px 16px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.3s;
    }

    .modal-footer button:hover {
      background-color: #218838;
    }

    /* Active Modal */
    .modal.active {
      display: block;
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Button to Open the Modal -->
  <button class="open-modal-btn" id="openModalBtn">Open Modal</button>

  <!-- The Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Modal Title</h2>
        <button class="close-btn" id="closeModalBtn">&times;</button>
      </div>
      <div class="modal-body">
        <p>This is a simple modal popup with a close button and an overlay background.</p>
      </div>
      <div class="modal-footer">
        <button id="confirmBtn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // Get elements
    const openModalBtn = document.getElementById("openModalBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modal = document.getElementById("modal");

    // Function to open the modal
    openModalBtn.addEventListener("click", function() {
      modal.classList.add("active");
    });

    // Function to close the modal
    closeModalBtn.addEventListener("click", function() {
      modal.classList.remove("active");
    });

    // Close modal when clicking outside the modal content
    window.addEventListener("click", function(event) {
      if (event.target === modal) {
        modal.classList.remove("active");
      }
    });

    // Optionally, handle the "Confirm" button click
    document.getElementById("confirmBtn").addEventListener("click", function() {
      alert("Confirmed!");
      modal.classList.remove("active");
    });
  </script>

</body>
</html>
