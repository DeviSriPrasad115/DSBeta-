<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Dropdown with Animation</title>
    <link rel="Stylesheet" href="style.css"
</head>
<body>

    <div class="dropdown">
        <button class="dropdown-btn">Select an option</button>
        <div class="dropdown-content">
            <a href="#" data-value="Option 1">Option 1</a>
            <a href="#" data-value="Option 2">Option 2</a>
            <a href="#" data-value="Option 3">Option 3</a>
            <a href="#" data-value="Option 4">Option 4</a>
        </div>
    </div>

    <div class="selected-value" id="selectedValue">Selected value will appear here</div>

    <script src="drop.js">
        
    </script>

</body>
</html>
