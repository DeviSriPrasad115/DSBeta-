<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dropdown.css">
    <title>Custom Dropdown Menu</title>
</head>
<body>
    <div class="dropdown">
        <button onclick="toggleDropdown()" class="dropbtn">Select Options</button>
        <div id="dropdown-content" class="dropdown-content">
            <label><input type="checkbox" value="Option 1" onchange="updateSelected()"> Option 1</label>
            <label><input type="checkbox" value="Option 2" onchange="updateSelected()"> Option 2</label>
            <label><input type="checkbox" value="Option 3" onchange="updateSelected()"> Option 3</label>
            <label><input type="checkbox" value="Option 4" onchange="updateSelected()"> Option 4</label>
        </div>
        <div class="selected-items"></div>
    </div>

    <script src="dropdown.js"></script>
</body>
</html>
