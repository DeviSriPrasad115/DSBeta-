<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Filterable Image Gallery</title>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <div class="container">
        <h1>Image Gallery</h1>
        <div class="gallery-filter">
            <button class="filter-button" data-filter="all">All</button>
            <button class="filter-button" data-filter="nature">Nature</button>
            <button class="filter-button" data-filter="animals">Animals</button>
            <button class="filter-button" data-filter="architecture">Architecture</button>
        </div>

        <div class="gallery">
            <div class="gallery-item nature"><img src="https://cdn.stocksnap.io/img-thumbs/280h/enchanting-forest_1CFKSWRR5X.jpg" alt="Nature 1"></div>
            <div class="gallery-item nature"><img src="https://thumbs.dreamstime.com/b/environment-earth-day-hands-trees-growing-seedlings-bokeh-green-background-female-hand-holding-tree-nature-field-gra-130247647.jpg" alt="Nature 2"></div>
            <div class="gallery-item animals"><img src="https://images.ctfassets.net/hrltx12pl8hq/1D85eAdM0IhXrEYsoOt7Ut/107424ea3e7e10ab3203446dae175cf7/3_jungle_animals.webp" alt="Animal 1"></div>
            <div class="gallery-item animals"><img src="https://www.shutterstock.com/image-photo/lion-king-forest-260nw-2482067871.jpg" alt="Animal 2"></div>
            <div class="gallery-item architecture"><img src="https://i0.wp.com/www.lifeofanarchitect.com/wp-content/uploads/2021/10/What-is-Architecture-Drafted-View.jpg?resize=1200%2C538&ssl=1" alt="Architecture 1"></div>
            <div class="gallery-item architecture"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSl2U6ni9RlXnAfitnFdvNXbif6gZqXCWdq2Q&s" alt="Architecture 2"></div>
        </div>
    </div>

    <script src="responsive.js"></script>
</body>
</html>
